seed: 42

training:
  epochs: 50
  batch_size: 8
  num_workers: 4
  pin_memory: true
  val_every: 1
  use_amp: true
  max_grad_norm: 1.0
  device: "auto"         # auto | cpu | cuda | cuda:0

optimizer:
  name: "adamw"          # adam | adamw | sgd
  lr: 0.0001
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  momentum: 0.9

scheduler:
  enabled: true
  name: "cosine"         # cosine | steplr | reducelronplateau
  params:
    T_max: 50
    eta_min: 0.000001

logging:
  output_root: "./outputs"
  experiment_name: "baseline_unet"
  save_checkpoint_every: 1

checkpoint:
  monitor: "val_mask_dice"
  mode: "max"            # max | min
  
patching:
  build_splits: ["train"]
  patch_size: 256
  stride: 128

sampling:
  enabled: true
  total_samples: 12000
  random_state: 42
  ratios:
    boundary: 0.4
    positive: 0.4
    negative: 0.2

transforms:
  train_mode: "general"         # none | general | general_artifact_aware
  val_mode: "none"
  test_mode: "none"

  normalization:
    mode: "none"                # none | dataset | imagenet
    mean: null
    std: null

  general:
    hflip_p: 0.5
    vflip_p: 0.5
    rotate90_p: 0.5

    shift_scale_rotate_p: 0.5
    shift_limit: 0.0625
    scale_limit: 0.10
    rotate_limit: 20

    brightness_contrast_p: 0.3
    brightness_limit: 0.20
    contrast_limit: 0.20

    gamma_p: 0.3
    gamma_limit: [80, 120]

  artifact_aware:
    artifact_block_p: 0.4

    hair_p: 0.3
    min_hairs: 1
    max_hairs: 6
    max_hair_thickness: 2

    blur_p: 0.2
    noise_p: 0.15
    shadow_p: 0.2


loss:
  terms:
    - name: "bce"
      weight: 1.0
      pred_key: "mask"
      target_key: "mask"
      params:
        from_logits: true

    - name: "dice"
      weight: 1.0
      pred_key: "mask"
      target_key: "mask"
      params:
        from_logits: true
        smooth: 1.0

    - name: "bce"
      weight: 0.5
      pred_key: "boundary"
      target_key: "boundary"
      params:
        from_logits: true


metrics:
  terms:
    - name: "dice"
      pred_key: "mask"
      target_key: "mask"
      params:
        from_logits: true
        threshold: 0.5

    - name: "iou"
      pred_key: "mask"
      target_key: "mask"
      params:
        from_logits: true
        threshold: 0.5

    - name: "sensitivity"
      pred_key: "mask"
      target_key: "mask"
      params:
        from_logits: true
        threshold: 0.5

    - name: "specificity"
      pred_key: "mask"
      target_key: "mask"
      params:
        from_logits: true
        threshold: 0.5

    - name: "hd95"
      pred_key: "mask"
      target_key: "mask"
      params:
        from_logits: true
        threshold: 0.5
        both_empty_value: 0.0
        one_empty_value: null

validation:
  sliding_window:
    patch_size: 256
    stride: 128
    tile_batch_size: 4

  threshold: 0.5


inference:
  threshold: 0.5

  save_probability_maps: true
  save_binary_masks: true
  save_overlays: true

  save_boundary_probability_maps: true
  save_boundary_masks: true